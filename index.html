<!DOCTYPE html>       kontol
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SYAIR PRABU GENERATOR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amaranth:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Amaranth',sans-serif;
}

body{
background:#111;
padding:20px;
text-align:center;
}

.toolbar{
margin-bottom:20px;
}

.poster{
position:relative;
width:1080px;
height:1080px;
margin:auto;
overflow:hidden;

transform:none !important;
}

#templateImg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.data{
position:absolute;
color:#ffd700;
font-weight:bold;
text-shadow:
2px 2px 0 #000,
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000;
}

/* BBFS */
#bbfs{
top:280px;
left:138px;
width:360px;
font-size:82px;
}

/* HOKI */
#hoki{
top:280px;
left:670px;
width:220px;
font-size:80px;
}

/* COLOK BEBAS */
#bebas{
top:465px;
left:360px;
font-size:70px;
}

/* COLOK MACAU */
#macau{
top:548px;
left:323px;
font-size:70px;
}

/* KEPALA */
#kepala{
top:460px;
left:780px;
font-size:60px;
}

/* EKOR */
#ekor{
top:550px;
left:747px;
font-size:60px;
}

/* TOP 2D */
#top2d{
top:735px;
left:110px;
width:450px;
font-size:56px;
line-height:1.1;
}

/* TOP 3D */
#top3d{
top:925px;
left:105px;
width:450px;
font-size:45px;
}

/* SHIO */
#shio{
top:936px;
left:630px;
width:280px;
font-size:40px;
}

/* PASARAN */
#pasaranText{

top:145px;
left:0;

width:102%;

text-align:center;

font-size:60px;
font-weight:bold;

color:#ffd700;
}

/* TANGGAL */
#tanggalText{

top:410px;
left:600px;

width:350px;

font-size:40px;
font-weight:bold;

color:#ffd700;
}

#shioImage{
    position:absolute;
    top:740px;
    left:590px;

    width:370px;
    height:auto;

    display:block;

    z-index:2;
}

button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="toolbar">

<input
type="text"
id="pasaranInput"
placeholder="Nama Pasaran">

<input type="date" id="tanggalInput">

<input type="file" id="bgUpload" accept="image/*">

<button onclick="generate()">
GENERATE BBFS
</button>

<button onclick="simpanPNG()">
SIMPAN PNG
</button>

</div>

<div class="poster">

<img id="templateImg" src="MEXICO.png">

<div class="data" id="pasaranText">
MEXICO
</div>

<div class="data" id="tanggalText">
08 JUNI 2026
</div>

<div class="data" id="bbfs">09453</div>
<div class="data" id="hoki">9453</div>

<div class="data" id="bebas">0/5</div>
<div class="data" id="macau">09/54</div>

<div class="data" id="kepala">94</div>
<div class="data" id="ekor">53</div>

<div class="data" id="top2d">
09*45*30*<br>
43*50*95
</div>

<div class="data" id="top3d">
453*530*309*043
</div>

<img
id="shioImage"
src="img/shio/monyet.png">

<div class="data" id="shio">
SHIO MONYET
</div>

</div>

<script>

const shioData={
KUDA:["01","13","25","37","49","61","73","85","97"],
ULAR:["02","14","26","38","50","62","74","86","98"],
NAGA:["03","15","27","39","51","63","75","87","99"],
KELINCI:["04","16","28","40","52","64","76","88","00"],
HARIMAU:["05","17","29","41","53","65","77","89"],
KERBAU:["06","18","30","42","54","66","78","90"],
TIKUS:["07","19","31","43","55","67","79","91"],
BABI:["08","20","32","44","56","68","80","92"],
ANJING:["09","21","33","45","57","69","81","93"],
AYAM:["10","22","34","46","58","70","82","94"],
MONYET:["11","23","35","47","59","71","83","95"],
KAMBING:["12","24","36","48","60","72","84","96"]
};

function getShio(angka){
for(let nama in shioData){
if(shioData[nama].includes(angka)){
return nama;
}
}
return "-";
}

function generateUnique5Digit(){

let arr=[];

while(arr.length<5){

let n=Math.floor(Math.random()*10).toString();

if(!arr.includes(n)){
arr.push(n);
}

}

return arr.join('');
}

function formatTanggal(tanggal){

const bulan=[
"JANUARI",
"FEBRUARI",
"MARET",
"APRIL",
"MEI",
"JUNI",
"JULI",
"AGUSTUS",
"SEPTEMBER",
"OKTOBER",
"NOVEMBER",
"DESEMBER"
];

let d=new Date(tanggal);

return d.getDate()+" "+
bulan[d.getMonth()]+" "+
d.getFullYear();

}

function generate(){

let bbfs=generateUnique5Digit();

let pasaran=
document.getElementById("pasaranInput").value;

if(pasaran==""){
pasaran="MEXICO";
}

document.getElementById("pasaranText")
.innerHTML=
pasaran.toUpperCase();


let tanggal=
document.getElementById("tanggalInput").value;

if(tanggal!=""){

document.getElementById("tanggalText")
.innerHTML=
formatTanggal(tanggal);

}else{

let today=new Date();

document.getElementById("tanggalText")
.innerHTML=
formatTanggal(today);

}

let A=bbfs[0];
let B=bbfs[1];
let C=bbfs[2];
let D=bbfs[3];
let E=bbfs[4];

document.getElementById("bbfs").innerHTML=bbfs;

document.getElementById("bbfs").innerHTML=bbfs;
document.getElementById("hoki").innerHTML=B+C+D+E;

document.getElementById("bebas").innerHTML=A+"/"+D;
document.getElementById("macau").innerHTML=A+B+"/"+D+C;

document.getElementById("kepala").innerHTML=B+C;
document.getElementById("ekor").innerHTML=D+E;

document.getElementById("top2d").innerHTML=
A+B+"*"+
C+D+"*"+
E+A+"*<br>"+
C+E+"*"+
D+A+"*"+
B+D;

document.getElementById("top3d").innerHTML=
A+B+C+"*"+
B+C+D+"*"+
C+D+E+"*"+
D+E+A;

let namaShio = getShio(B+D);

document.getElementById("shio").innerHTML =
"SHIO " + namaShio;

const gambarShio={

KUDA:"img/shio/kuda.png",
ULAR:"img/shio/ular.png",
NAGA:"img/shio/naga.png",
KELINCI:"img/shio/kelinci.png",
HARIMAU:"img/shio/harimau.png",
KERBAU:"img/shio/kerbau.png",
TIKUS:"img/shio/tikus.png",
BABI:"img/shio/babi.png",
ANJING:"img/shio/anjing.png",
AYAM:"img/shio/ayam.png",
MONYET:"img/shio/monyet.png",
KAMBING:"img/shio/kambing.png"

};

document.getElementById("shioImage").src =
gambarShio[namaShio];

}

document
.getElementById("bgUpload")
.addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){

document
.getElementById("templateImg")
.src=ev.target.result;

};

reader.readAsDataURL(file);

});

function simpanPNG(){

html2canvas(document.querySelector(".poster"),{
    scale:1,
    useCORS:true,
    backgroundColor:null
}).then(canvas=>{

    let link=document.createElement("a");

    link.download="SYAIR-PRABU.png";
    link.href=canvas.toDataURL("image/png");

    link.click();

});

}

generate();

</script>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
